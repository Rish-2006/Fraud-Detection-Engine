name: FraudGuard Pro CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit and integration tests
        run: pytest tests/ --cov=src --cov-report=xml

      - name: Upload coverage to GitHub
        uses: actions/upload-artifact@v3
        with:
          name: coverage-report
          path: coverage.xml
          fail_on_missing_artifact: false

      - name: Validate config file
        run: python -c "import yaml; yaml.safe_load(open('config.yaml'))"

      - name: Check import structure
        run: python -c "from src.utils.logger import get_logger; print('Imports OK')"

  build-docker:
    name: Build Docker Image
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker Image
        run: docker build -t fraudguard-pro:latest .

      - name: Verify container starts
        run: |
          docker run -d -p 8000:8000 --name test-container fraudguard-pro:latest
          sleep 10
          curl -f http://localhost:8000/health || exit 1
          docker stop test-container
